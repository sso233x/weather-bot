name: Check Outcomes

on:
  schedule:
    # 08:00 UTC (~4am ET) — gives prior day's markets time to resolve
    - cron: "0 8 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Check outcomes
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python check_outcomes.py

      - name: Commit updated log
        run: |
          git config user.name "weather-bot"
          git config user.email "actions@github.com"
          git add trade_log.csv
          git diff --staged --quiet || git commit -m "Update resolved outcomes [skip ci]"
          git push
