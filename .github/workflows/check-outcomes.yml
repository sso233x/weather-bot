name: Check Outcomes

on:
  schedule:
    # 12:20 UTC = ~8:20am EDT -- runs 20 min AFTER Polymarket's 8am ET
    # settlement, not before it. (Previously ran at 08:00 UTC / ~4am ET,
    # which was 4 hours before that day's settlement completed, causing
    # every market's outcome to be picked up a full day later than
    # necessary.) Like weather-check.yml, this drifts by an hour once
    # EST begins in Nov (8am ET becomes 13:00 UTC) -- adjust then.
    - cron: "20 12 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Check outcomes
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python check_outcomes.py

      - name: Commit updated log
        run: |
          git config user.name "weather-bot"
          git config user.email "actions@github.com"
          git add trade_log.csv
          git diff --staged --quiet && exit 0
          git commit -m "Update resolved outcomes [skip ci]"
          git pull --rebase origin main
          git push
