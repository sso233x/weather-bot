name: Calibrate

on:
  schedule:
    # 12:51 UTC (not :45) -- same congestion-avoidance reasoning as
    # check-outcomes.yml. Still comfortably after that workflow's ~12:23
    # run time.
    - cron: "51 12 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  calibrate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Run calibration
        run: python calibrate.py > calibration_output.txt

      - name: Show output in log
        run: cat calibration_output.txt

      - name: Send results to Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python send_calibration.py

      - name: Commit learned adjustments
        run: |
          git config user.name "weather-bot"
          git config user.email "actions@github.com"
          git add learned_adjustments.json
          git diff --staged --quiet && exit 0
          git commit -m "Update learned adjustments [skip ci]"
          git pull --rebase origin main
          git push
