name: Calibrate

on:
  schedule:
    # 08:20 UTC -- runs 20 min after check-outcomes.yml (08:00 UTC) so this
    # picks up that day's freshly committed trade_log.csv, including any
    # newly backfilled actual_high values.
    - cron: "20 8 * * *"
  workflow_dispatch: {}

jobs:
  calibrate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Run calibration
        run: python calibrate.py > calibration_output.txt

      - name: Show output in log
        run: cat calibration_output.txt

      - name: Send results to Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python send_calibration.py
