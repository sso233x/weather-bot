name: Weather Check

on:
  schedule:
    # ~00:15 UTC = ~8:15pm EDT / 7:15pm EST — well before midnight ET
    # even with a multi-hour GitHub Actions scheduling delay
    - cron: "15 0 * * *"
    # ~09:15 UTC = ~5:15am EDT / 4:15am EST — well before noon ET,
    # and the NBM 07Z cycle is reliably available by this hour
    # (13Z isn't disseminated until ~14:00-16:00 UTC, too late for a
    # noon deadline once you factor in scheduling delay)
    - cron: "15 9 * * *"
  workflow_dispatch:
    inputs:
      nbm_cycle:
        description: "NBM cycle to pull (01, 07, 13, 19)"
        required: false
        default: "01"

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Determine NBM cycle
        id: cycle
        run: |
          if [ "${{ github.event.schedule }}" = "15 9 * * *" ]; then
            echo "value=07" >> "$GITHUB_OUTPUT"
          elif [ -n "${{ github.event.inputs.nbm_cycle }}" ]; then
            echo "value=${{ github.event.inputs.nbm_cycle }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=01" >> "$GITHUB_OUTPUT"
          fi

      - name: Run signal check
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          NBM_CYCLE: ${{ steps.cycle.outputs.value }}
        run: python main.py

      - name: Commit updated data files
        run: |
          git config user.name "weather-bot"
          git config user.email "actions@github.com"
          git add run_history.json trade_log.csv
          git diff --staged --quiet || git commit -m "Update run history + predictions [skip ci]"
          git push
