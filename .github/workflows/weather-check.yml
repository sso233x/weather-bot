name: Weather Check

on:
  schedule:
    # 01:11 UTC = ~9:11pm EDT (shifts to 8:11pm once EST begins in Nov).
    # Shifted off :05 -- round minute marks see more GitHub Actions
    # scheduling congestion/delay. Today's runs landed ~2hrs late at the
    # old :05 offset.
    - cron: "11 1 * * *"
    # 13:37 UTC = ~9:37am EDT (shifts to 8:37am once EST begins in Nov).
    # Same congestion-avoidance shift, off :05.
    - cron: "37 13 * * *"
  workflow_dispatch:
    inputs:
      nbm_cycle:
        description: "NBM cycle to pull (01, 07, 13, 19)"
        required: false
        default: "01"

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Determine NBM cycle
        id: cycle
        run: |
          if [ "${{ github.event.schedule }}" = "37 13 * * *" ]; then
            echo "value=07" >> "$GITHUB_OUTPUT"
          elif [ -n "${{ github.event.inputs.nbm_cycle }}" ]; then
            echo "value=${{ github.event.inputs.nbm_cycle }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=01" >> "$GITHUB_OUTPUT"
          fi

      - name: Run signal check
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          NBM_CYCLE: ${{ steps.cycle.outputs.value }}
        run: python main.py

      - name: Commit updated data files
        run: |
          git config user.name "weather-bot"
          git config user.email "actions@github.com"
          git add run_history.json trade_log.csv
          git diff --staged --quiet && exit 0
          git commit -m "Update run history + predictions [skip ci]"
          git pull --rebase origin main
          git push
